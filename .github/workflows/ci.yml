name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: moltpal
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: moltpal_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run migrations
      env:
        DATABASE_URL: postgresql://moltpal:test_password@localhost:5432/moltpal_test
      run: npm run db:migrate
    
    - name: Run tests
      env:
        DATABASE_URL: postgresql://moltpal:test_password@localhost:5432/moltpal_test
      run: npm test || echo "Tests not yet implemented"
    
    - name: Check code style
      run: echo "Linting not yet configured"

  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t moltpal:test .
    
    - name: Test Docker image
      run: docker run --rm moltpal:test node --version
